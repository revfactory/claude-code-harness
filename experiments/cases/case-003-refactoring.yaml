id: case-003
category: refactoring
title: "스파게티 코드 리팩토링"
difficulty: medium
description: |
  아래 스파게티 코드를 깔끔하게 리팩토링하세요. 동작은 동일하게 유지해야 합니다.

  ```javascript
  // messy-calculator.js
  function calc(items, tax, disc, type, mem) {
    let t = 0;
    let r = [];
    for (let i = 0; i < items.length; i++) {
      let p = items[i].price;
      let q = items[i].qty;
      if (type === 'wholesale' && q > 100) {
        p = p * 0.8;
      } else if (type === 'wholesale' && q > 50) {
        p = p * 0.9;
      } else if (type === 'vip') {
        p = p * 0.85;
      }
      let sub = p * q;
      if (disc > 0) {
        sub = sub - (sub * disc / 100);
      }
      let tx = sub * tax / 100;
      let total = sub + tx;
      t = t + total;
      r.push({name: items[i].name, price: p, qty: q, subtotal: sub, tax: tx, total: total});
      if (mem) {
        if (!mem[items[i].name]) { mem[items[i].name] = 0; }
        mem[items[i].name] = mem[items[i].name] + total;
      }
    }
    if (t > 10000) { t = t - (t * 0.05); }
    return {items: r, grandTotal: t};
  }
  ```

  리팩토링 요구사항:
  - 의미 있는 변수명과 함수명 사용
  - 단일 책임 원칙에 따라 함수 분리
  - 매직 넘버를 상수로 추출
  - 가격 정책을 전략 패턴으로 분리
  - 동일한 입출력 보장 (테스트 작성)
expected_outputs:
  - "리팩토링된 calculator.js"
  - "테스트 파일"
evaluation_criteria:
  completeness: "모든 리팩토링 요구사항 충족"
  quality: "패턴 적용, 가독성, 명확한 구조"
  correctness: "기존 동작과 동일한 결과"
  efficiency: "과도한 추상화 없이 적절한 수준"
