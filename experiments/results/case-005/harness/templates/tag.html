<div class="tag-page">
  <h1>Tag: {{ tagName }}</h1>
  <p>{{ postCount }} posts</p>
  {{#each posts}}
  <article class="post-summary">
    <h2><a href="{{ baseUrl }}/posts/{{ slug }}.html">{{ title }}</a></h2>
    <div class="post-meta">
      <time>{{ date }}</time>
    </div>
  </article>
  {{/each}}
  <p><a href="{{ baseUrl }}/tags.html">All Tags</a></p>
</div>
