<article class="post">
  <header class="post-header">
    <h1>{{ title }}</h1>
    <div class="post-meta">
      <time>{{ date }}</time>
      {{#if tags}}
      <div class="post-tags">
        {{#each tags}}
        <a href="{{ baseUrl }}/tags/{{ this }}.html" class="tag">{{ this }}</a>
        {{/each}}
      </div>
      {{/if}}
    </div>
  </header>
  <div class="post-content">
    {{ body }}
  </div>
</article>
