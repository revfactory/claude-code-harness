<article class="post">
  <header class="post-header">
    <h1>{{ title }}</h1>
    <div class="post-meta">
      <time datetime="{{ date }}">{{ date }}</time>
      <span class="author">by {{ author }}</span>
    </div>
    <div class="tags">{{ tags }}</div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <footer class="post-footer">
    <a href="/">&larr; Back to all posts</a>
  </footer>
</article>
